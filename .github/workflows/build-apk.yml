name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL }}

      # Signed release builds only run once ANDROID_KEYSTORE_BASE64 (and the
      # matching password/alias secrets) exist in the repo — see
      # android/keystore.properties.example for what's needed and the README
      # for the exact `gh secret set` commands. Until then, every trigger
      # (including tag pushes) safely falls back to an unsigned debug build,
      # so this workflow keeps working before release signing is set up.
      - name: Check for release signing secret
        id: signing
        run: echo "enabled=${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}" >> "$GITHUB_OUTPUT"

      - name: Determine release flow
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* && "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version_name=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "version_name=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi
          echo "version_code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        if: steps.release.outputs.is_release == 'true'
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build signed release APK
        if: steps.release.outputs.is_release == 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PappVersionCode=${{ steps.release.outputs.version_code }} \
            -PappVersionName=${{ steps.release.outputs.version_name }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build debug APK
        if: steps.release.outputs.is_release == 'false'
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: homeportal-apk
          path: ${{ steps.release.outputs.is_release == 'true' && 'android/app/build/outputs/apk/release/app-release.apk' || 'android/app/build/outputs/apk/debug/app-debug.apk' }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release.outputs.is_release == 'true' && 'android/app/build/outputs/apk/release/app-release.apk' || 'android/app/build/outputs/apk/debug/app-debug.apk' }}
          generate_release_notes: true
